
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>METAI - Multi-File IDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        :root { --accent: #3b82f6; --bg-dark: #020617; --bg-panel: #0f172a; }

        body { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; background-color: var(--bg-dark); color: #f8fafc; font-family: 'Inter', sans-serif; }

        /* Device Simulator Classes */
        .view-mobile { width: 375px !important; margin: 20px auto; border: 12px solid #1e293b; border-radius: 32px; height: calc(100% - 40px) !important; }
        .view-tablet { width: 768px !important; margin: 20px auto; border: 12px solid #1e293b; border-radius: 24px; height: calc(100% - 40px) !important; }
        .view-desktop { width: 100% !important; height: 100% !important; margin: 0; border: none; }

        #sidebar { background-color: var(--bg-panel); width: 280px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @media (max-width: 1024px) { #sidebar { position: fixed; left: -100%; z-index: 50; height: 100%; } #sidebar.active { left: 0; } }

        .checkerboard { background-image: linear-gradient(45deg, #e2e8f0 25%, transparent 25%), linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e2e8f0 75%), linear-gradient(-45deg, transparent 75%, #e2e8f0 75%); background-size: 20px 20px; background-color: #f1f5f9; }

        .loader { border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid var(--accent); width: 16px; height: 16px; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* File Tab Active State */
        .tab-active { background-color: #010409; color: #60a5fa; border-top: 2px solid #3b82f6; }
        .tab-inactive { background-color: transparent; color: #64748b; border-top: 2px solid transparent; hover:text-white; }
    </style>
</head>
<body class="antialiased">

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/80 z-40 hidden" onclick="toggleSidebar()"></div>

    <div class="flex h-full w-full">
        <aside id="sidebar" class="border-r border-white/5 flex flex-col shrink-0">
            <div class="p-6 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold shadow-lg shadow-blue-500/20">M</div>
                    <span class="font-black tracking-tighter text-xl italic">METAI <span class="text-[10px] text-blue-400 uppercase not-italic">v5</span></span>
                </div>
                <button onclick="toggleSidebar()" class="lg:hidden text-slate-500"><i class="fas fa-times"></i></button>
            </div>

            <div class="flex-1 overflow-y-auto px-4 space-y-8">
                <section>
                    <div class="flex items-center justify-between mb-3 px-2">
                        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Workspaces</span>
                        <button onclick="createNewProject()" class="text-blue-500 hover:text-white transition" title="New Project"><i class="fas fa-plus-circle"></i></button>
                    </div>
                    <div id="project-list" class="space-y-1"></div>
                </section>

                <section>
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2">Asset Library</span>
                    <div class="mt-3 px-2 space-y-3">
                        <div class="relative">
                            <input id="asset-search" type="text" placeholder="Search images..." class="w-full bg-white/5 border border-white/10 rounded-lg py-2 pl-8 pr-2 text-xs outline-none focus:border-blue-500 transition-all">
                            <i class="fas fa-search absolute left-3 top-2.5 text-slate-600 text-[10px]"></i>
                        </div>
                        <div id="asset-results" class="grid grid-cols-2 gap-2">
                            <div class="h-16 bg-[url('https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=200&q=80')] bg-cover bg-center rounded-md cursor-pointer hover:opacity-80 transition flex items-center justify-center border border-white/10" onclick="copyAsset('https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=1000&q=80')"></div>
                            <div class="h-16 bg-[url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=200&q=80')] bg-cover bg-center rounded-md cursor-pointer hover:opacity-80 transition flex items-center justify-center border border-white/10" onclick="copyAsset('https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=1000&q=80')"></div>
                        </div>
                    </div>
                </section>
            </div>

            <div class="p-4 bg-black/20 border-t border-white/5">
                <button onclick="toggleSettings()" class="w-full text-slate-400 hover:text-white flex items-center gap-3 transition px-3 py-2 text-sm">
                    <i class="fas fa-sliders-h"></i> <span>Configuration</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0">
            <header class="h-14 border-b border-white/5 bg-slate-900/50 flex items-center justify-between px-4 shrink-0">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden text-slate-400 hover:text-white"><i class="fas fa-bars"></i></button>
                    <div class="hidden md:flex items-center bg-black/40 rounded-full p-1 border border-white/5">
                        <button onclick="setDevice('mobile')" class="w-8 h-8 rounded-full hover:bg-white/10 transition text-[10px]"><i class="fas fa-mobile-alt"></i></button>
                        <button onclick="setDevice('tablet')" class="w-8 h-8 rounded-full hover:bg-white/10 transition text-[10px]"><i class="fas fa-tablet-alt"></i></button>
                        <button onclick="setDevice('desktop')" class="w-8 h-8 rounded-full bg-blue-600 text-white transition text-[10px]"><i class="fas fa-desktop"></i></button>
                    </div>
                </div>

                <div class="flex bg-white/5 rounded-lg p-1">
                    <button id="btn-preview" onclick="setView('preview')" class="px-4 py-1.5 rounded-md text-[10px] font-bold transition bg-blue-600 text-white">PREVIEW</button>
                    <button id="btn-code" onclick="setView('code')" class="px-4 py-1.5 rounded-md text-[10px] font-bold transition text-slate-400">CODE</button>
                </div>

                <div class="flex items-center gap-2">
                    <button onclick="undoChange()" class="p-2 text-slate-500 hover:text-white" title="Undo AI Action"><i class="fas fa-history"></i></button>
                    <button onclick="downloadCode()" class="bg-blue-600/20 hover:bg-blue-600 text-blue-400 hover:text-white border border-blue-500/30 px-3 py-1.5 rounded-md text-[10px] font-bold transition uppercase flex items-center gap-2"><i class="fas fa-download"></i> Export</button>
                </div>
            </header>

            <div class="flex-1 relative overflow-hidden flex flex-col">
                <div id="preview-container" class="w-full h-full checkerboard overflow-auto flex items-start justify-center transition-all duration-500">
                    <iframe id="preview-frame" class="bg-white shadow-2xl view-desktop transition-all duration-500"></iframe>
                </div>
                
                <div id="code-container" class="hidden w-full h-full flex-col bg-[#010409]">
                    <div class="flex border-b border-white/5 bg-slate-900 px-4 pt-2">
                        <button onclick="switchFile('html')" id="tab-html" class="tab-active px-4 py-2 text-xs font-mono rounded-t-lg transition flex items-center gap-2"><i class="fab fa-html5 text-orange-500"></i> index.html</button>
                        <button onclick="switchFile('css')" id="tab-css" class="tab-inactive px-4 py-2 text-xs font-mono rounded-t-lg transition flex items-center gap-2"><i class="fab fa-css3-alt text-blue-400"></i> style.css</button>
                        <button onclick="switchFile('js')" id="tab-js" class="tab-inactive px-4 py-2 text-xs font-mono rounded-t-lg transition flex items-center gap-2"><i class="fab fa-js text-yellow-400"></i> script.js</button>
                    </div>
                    <div class="flex-1 relative">
                        <textarea id="code-editor" oninput="manualSync()" class="w-full h-full bg-transparent text-slate-300 font-mono p-6 text-sm resize-none outline-none border-none" spellcheck="false"></textarea>
                    </div>
                </div>
            </div>

            <footer class="p-4 md:p-6 border-t border-white/5 bg-slate-900/50 backdrop-blur-xl">
                <div class="max-w-4xl mx-auto relative group">
                    <textarea id="user-input" placeholder="Ask AI to build or modify your index.html..." 
                        class="w-full bg-white/5 border border-white/10 text-white rounded-2xl pl-5 pr-16 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500/50 h-16 transition-all shadow-2xl"
                        onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }"></textarea>
                    
                    <button onclick="sendMessage()" id="send-btn" class="absolute right-3 top-3 bg-blue-600 hover:bg-blue-500 text-white w-10 h-10 rounded-xl flex items-center justify-center transition-all shadow-lg active:scale-90">
                        <i class="fas fa-sparkles"></i>
                    </button>
                    <div id="loading-indicator" class="absolute right-4 top-5 hidden"><div class="loader"></div></div>
                </div>
            </footer>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-[70] p-4 backdrop-blur-md">
        <div class="bg-slate-900 border border-white/10 rounded-3xl w-full max-w-md p-8 shadow-2xl">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-white"><i class="fas fa-key text-blue-500"></i> Developer API</h2>
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">OpenRouter Key</label>
                    <input type="password" id="setting-key" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none focus:border-blue-500" placeholder="sk-or-...">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">AI Model</label>
                    <input type="text" id="setting-model" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none" value="deepseek/deepseek-r1:free">
                </div>
            </div>
            <div class="mt-8 flex justify-end gap-4">
                <button onclick="toggleSettings()" class="text-slate-400 hover:text-white font-bold px-4 transition">CANCEL</button>
                <button onclick="saveSettings()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-500 transition shadow-lg shadow-blue-500/20">SAVE CONFIG</button>
            </div>
        </div>
    </div>

    <script>
        const SYSTEM_PROMPT = `Expert Web Developer. Generate a SINGLE-FILE modern index.html with Tailwind CSS. Output ONLY raw HTML. Do not include external CSS/JS files, output everything inside the HTML.`;
        
        // Data Structure Update for v5
        let projects = JSON.parse(localStorage.getItem('metai_v5_projects')) || [];
        let currentProjectId = localStorage.getItem('metai_v5_current_id') || null;
        let activeFileTab = 'html'; // 'html', 'css', 'js'

        document.addEventListener('DOMContentLoaded', () => {
            const settings = JSON.parse(localStorage.getItem('metai_settings')) || { key: "", model: "deepseek/deepseek-r1:free" };
            document.getElementById('setting-key').value = settings.key;
            document.getElementById('setting-model').value = settings.model;
            renderProjectList();
            if (projects.length === 0) createNewProject();
            else loadProject(currentProjectId || projects[0].id);
        });

        // UI Core
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('sidebar-overlay').classList.toggle('hidden'); }
        function toggleSettings() { document.getElementById('settings-modal').classList.toggle('hidden'); document.getElementById('settings-modal').classList.toggle('flex'); }
        
        function setDevice(type) {
            const frame = document.getElementById('preview-frame');
            frame.className = `bg-white shadow-2xl transition-all duration-500 view-${type}`;
            document.querySelectorAll('header button i.fa-mobile-alt, i.fa-tablet-alt, i.fa-desktop').forEach(el => el.parentElement.classList.remove('bg-blue-600', 'text-white'));
            event.currentTarget.classList.add('bg-blue-600', 'text-white');
        }

        function setView(v) {
            const isP = v === 'preview';
            document.getElementById('preview-container').classList.toggle('hidden', !isP);
            document.getElementById('code-container').classList.toggle('hidden', isP);
            document.getElementById('btn-preview').className = isP ? "px-4 py-1.5 rounded-md text-[10px] font-bold bg-blue-600 text-white" : "px-4 py-1.5 rounded-md text-[10px] font-bold text-slate-400";
            document.getElementById('btn-code').className = !isP ? "px-4 py-1.5 rounded-md text-[10px] font-bold bg-blue-600 text-white" : "px-4 py-1.5 rounded-md text-[10px] font-bold text-slate-400";
            if(!isP) refreshCodeEditor();
        }

        function switchFile(type) {
            activeFileTab = type;
            ['html', 'css', 'js'].forEach(t => {
                document.getElementById(`tab-${t}`).className = t === type 
                    ? `tab-active px-4 py-2 text-xs font-mono rounded-t-lg transition flex items-center gap-2` 
                    : `tab-inactive px-4 py-2 text-xs font-mono rounded-t-lg transition flex items-center gap-2`;
            });
            refreshCodeEditor();
        }

        // Project Engine v5
        function createNewProject() {
            const p = { 
                id: Date.now().toString(), 
                name: `App_${Math.floor(Math.random()*900)+100}`, 
                history: [], 
                files: { html: "", css: "/* Custom Styles here */\nbody {\n  \n}", js: "// Custom Interactivity here\nconsole.log('App loaded!');" } 
            };
            projects.unshift(p); sync(); loadProject(p.id);
        }

        function loadProject(id) {
            currentProjectId = id; localStorage.setItem('metai_v5_current_id', id);
            renderProjectList(); switchFile('html'); compileAndPreview();
        }

        function refreshCodeEditor() {
            const p = projects.find(x => x.id === currentProjectId);
            if(p) document.getElementById('code-editor').value = p.files[activeFileTab];
        }

        function manualSync() {
            const p = projects.find(x => x.id === currentProjectId);
            if(p) { 
                p.files[activeFileTab] = document.getElementById('code-editor').value;
                sync(); compileAndPreview();
            }
        }

        function renderProjectList() {
            const l = document.getElementById('project-list'); l.innerHTML = '';
            projects.forEach(p => {
                const active = p.id === currentProjectId;
                const d = document.createElement('div');
                d.className = `group flex items-center justify-between px-3 py-2 rounded-lg cursor-pointer transition ${active ? 'bg-blue-600/10 text-blue-400 border border-blue-500/20' : 'text-slate-500 hover:text-white hover:bg-white/5 border border-transparent'}`;
                d.onclick = () => { loadProject(p.id); if(window.innerWidth < 1024) toggleSidebar(); };
                d.innerHTML = `<span class="truncate text-xs font-medium"><i class="fas fa-folder-open mr-2 ${active ? 'text-blue-500' : 'opacity-50'}"></i>${p.name}</span>
                    <button onclick="deleteProject('${p.id}', event)" class="opacity-0 group-hover:opacity-100 text-[10px] hover:text-red-500 transition"><i class="fas fa-trash"></i></button>`;
                l.appendChild(d);
            });
        }

        function deleteProject(id, e) {
            e.stopPropagation(); if(!confirm("Delete this workspace?")) return;
            projects = projects.filter(x => x.id !== id); sync();
            if(projects.length > 0) loadProject(projects[0].id); else createNewProject();
        }

        function sync() { localStorage.setItem('metai_v5_projects', JSON.stringify(projects)); }

        function compileAndPreview() {
            const p = projects.find(x => x.id === currentProjectId);
            if(!p) return;
            
            let htmlBase = p.files.html || '<body style="background:#0f172a; height:100vh; color:#64748b; display:flex; align-items:center; justify-content:center; font-family:sans-serif;">Describe your app below...</body>';
            
            // Inject Custom CSS and JS into the HTML for the preview
            const injection = `
                <style>${p.files.css}</style>
                <script>${p.files.js}<\/script>
            `;
            
            // Basic injection logic (append before closing body or at the end)
            let finalCode = htmlBase;
            if(finalCode.includes('</body>')) {
                finalCode = finalCode.replace('</body>', `${injection}</body>`);
            } else {
                finalCode += injection;
            }

            const f = document.getElementById('preview-frame').contentWindow.document;
            f.open(); f.write(finalCode); f.close();
        }

        function copyAsset(url) {
            navigator.clipboard.writeText(url).then(() => {
                alert("Image URL copied! Paste it into your prompt or code.");
            });
        }

        async function sendMessage() {
            const i = document.getElementById('user-input'); const s = JSON.parse(localStorage.getItem('metai_settings'));
            if(!i.value.trim() || !s?.key) return alert("Setup API Key in Configuration first.");
            
            const btn = document.getElementById('send-btn'); const ldr = document.getElementById('loading-indicator');
            i.disabled = true; btn.classList.add('hidden'); ldr.classList.remove('hidden');
            const p = projects.find(x => x.id === currentProjectId);

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${s.key}`},
                    body: JSON.stringify({ model: s.model, messages:
