<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>METAI - AI Website Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        body {
            min-height: 100dvh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #0f172a;
            color: #f8fafc;
        }

        /* Mobile Sidebar Overlay */
        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                bottom: 0;
                z-index: 50;
                width: 80%;
                max-width: 300px;
                background: #0f172a;
                box-shadow: 20px 0 50px rgba(0,0,0,0.5);
            }
            #sidebar.active { left: 0; }
            .mobile-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.7);
                z-index: 40;
                backdrop-filter: blur(4px);
            }
            .mobile-overlay.active { display: block; }
        }

        .checkerboard {
            background-image: linear-gradient(45deg, #e2e8f0 25%, transparent 25%), linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e2e8f0 75%), linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
            background-size: 20px 20px;
            background-color: #f1f5f9;
        }
        
        .loader {
            border: 2px solid #1e293b;
            border-radius: 50%;
            border-top: 2px solid #3b82f6;
            width: 18px; height: 18px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="font-sans antialiased">

    <div id="sidebar-overlay" class="mobile-overlay" onclick="toggleSidebar()"></div>

    <div id="app" class="flex w-full h-full">

        <aside id="sidebar" class="bg-slate-900 border-r border-slate-800 flex flex-col flex-shrink-0 transition-all duration-300 w-72">
            <div class="p-5 flex justify-between items-center">
                <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">METAI</h1>
                <button onclick="toggleSidebar()" class="md:hidden text-slate-400"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="px-5 mb-4">
                <button onclick="createNewProject(); if(window.innerWidth < 768) toggleSidebar();" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 rounded-lg transition-all flex items-center justify-center gap-2 text-sm">
                    <i class="fas fa-plus"></i> New Project
                </button>
            </div>

            <div class="flex-1 overflow-y-auto px-3 space-y-6">
                <div>
                    <p class="px-3 mb-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Projects</p>
                    <div id="project-list" class="space-y-1"></div>
                </div>
                
                <div>
                    <p class="px-3 mb-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Quick Actions</p>
                    <div class="space-y-1">
                        <button onclick="applyTemplate('Add a modern hero section'); if(window.innerWidth < 768) toggleSidebar();" class="w-full text-left px-3 py-2 text-sm text-slate-400 hover:bg-slate-800 rounded-md transition flex items-center gap-3">
                            <i class="fas fa-layer-group text-blue-400"></i> Hero Section
                        </button>
                        <button onclick="applyTemplate('Add a contact form'); if(window.innerWidth < 768) toggleSidebar();" class="w-full text-left px-3 py-2 text-sm text-slate-400 hover:bg-slate-800 rounded-md transition flex items-center gap-3">
                            <i class="fas fa-paper-plane text-emerald-400"></i> Contact Form
                        </button>
                    </div>
                </div>
            </div>

            <div class="p-4 bg-slate-950/50 border-t border-slate-800">
                <button onclick="toggleSettings()" class="w-full text-slate-400 hover:text-white flex items-center gap-3 transition px-3 py-2 text-sm">
                    <i class="fas fa-sliders-h"></i> <span>Settings</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-full min-w-0 bg-slate-950">
            
            <header class="h-14 border-b border-slate-800 bg-slate-900 flex items-center justify-between px-3 md:px-6 flex-shrink-0">
                <div class="flex items-center gap-2 md:gap-4">
                    <button onclick="toggleSidebar()" class="text-slate-400 p-2 -ml-2">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="bg-slate-800 p-1 rounded-lg flex text-[10px] md:text-xs font-bold">
                        <button id="btn-preview" onclick="setView('preview')" class="px-2 md:px-4 py-1 rounded-md bg-blue-600 text-white">PREVIEW</button>
                        <button id="btn-code" onclick="setView('code')" class="px-2 md:px-4 py-1 rounded-md text-slate-400">CODE</button>
                    </div>
                </div>

                <div class="flex items-center gap-2">
                    <button onclick="undoChange()" class="text-slate-400 p-2"><i class="fas fa-undo"></i></button>
                    <button onclick="downloadCode()" class="bg-slate-800 text-white p-2 md:px-3 md:py-1.5 rounded border border-slate-700 text-xs font-bold">
                        <i class="fas fa-download md:mr-1"></i><span class="hidden md:inline">EXPORT</span>
                    </button>
                </div>
            </header>

            <div class="flex-1 relative overflow-hidden">
                <div id="preview-container" class="w-full h-full checkerboard">
                    <iframe id="preview-frame" class="w-full h-full border-none bg-white"></iframe>
                </div>
                <div id="code-container" class="hidden w-full h-full bg-slate-950">
                    <textarea id="code-editor" class="w-full h-full bg-slate-950 text-blue-300 font-mono p-4 text-xs md:text-sm resize-none outline-none" readonly></textarea>
                </div>
            </div>

            <footer class="p-3 md:p-6 bg-slate-900 border-t border-slate-800">
                <div class="relative max-w-3xl mx-auto flex gap-2">
                    <textarea 
                        id="user-input" 
                        placeholder="Describe your site..." 
                        class="flex-1 bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none h-12 text-sm shadow-xl"
                        onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }"
                    ></textarea>
                    <button onclick="sendMessage()" id="send-btn" class="bg-blue-600 text-white w-12 h-12 rounded-xl flex items-center justify-center shrink-0">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                    <div id="loading-indicator" class="absolute right-4 top-4 hidden">
                        <div class="loader"></div>
                    </div>
                </div>
            </footer>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-slate-950/90 hidden items-center justify-center z-[60] p-4 backdrop-blur-sm">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-md p-6 shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-white">Settings</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">API Key</label>
                    <input type="password" id="setting-key" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-white outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Model</label>
                    <input type="text" id="setting-model" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-white outline-none" value="deepseek/deepseek-r1:free">
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <button onclick="toggleSettings()" class="px-4 py-2 text-slate-400">Cancel</button>
                <button onclick="saveSettings()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold">Save</button>
            </div>
        </div>
    </div>

    <script>
        const SYSTEM_PROMPT = `You are a world-class web designer. Generate a SINGLE modern index.html file. Use Tailwind CSS. Output ONLY raw HTML.`;
        const DEFAULT_SETTINGS = { url: "https://openrouter.ai/api/v1/chat/completions", key: "", model: "deepseek/deepseek-r1:free" };

        let projects = JSON.parse(localStorage.getItem('ai_builder_projects')) || [];
        let currentProjectId = localStorage.getItem('ai_builder_current_id') || null;

        document.addEventListener('DOMContentLoaded', () => {
            const settings = JSON.parse(localStorage.getItem('ai_builder_settings')) || DEFAULT_SETTINGS;
            document.getElementById('setting-key').value = settings.key;
            document.getElementById('setting-model').value = settings.model;
            renderProjectList();
            if (projects.length === 0) createNewProject();
            else loadProject(currentProjectId || projects[0].id);
        });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('sidebar-overlay').classList.toggle('active');
        }

        function toggleSettings() {
            document.getElementById('settings-modal').classList.toggle('hidden');
            document.getElementById('settings-modal').classList.toggle('flex');
        }

        function saveSettings() {
            const newSettings = { url: "https://openrouter.ai/api/v1/chat/completions", key: document.getElementById('setting-key').value, model: document.getElementById('setting-model').value };
            localStorage.setItem('ai_builder_settings', JSON.stringify(newSettings));
            toggleSettings();
        }

        function createNewProject() {
            const newProject = { id: Date.now().toString(), name: `Project ${projects.length + 1}`, history: [], code: "" };
            projects.unshift(newProject);
            saveProjects();
            loadProject(newProject.id);
        }

        function deleteProject(id, event) {
            event.stopPropagation();
            if(!confirm("Delete?")) return;
            projects = projects.filter(p => p.id !== id);
            saveProjects();
            if (projects.length > 0) loadProject(projects[0].id);
            else createNewProject();
        }

        function saveProjects() { localStorage.setItem('ai_builder_projects', JSON.stringify(projects)); renderProjectList(); }

        function renderProjectList() {
            const list = document.getElementById('project-list');
            list.innerHTML = '';
            projects.forEach(p => {
                const div = document.createElement('div');
                div.className = `flex items-center justify-between px-3 py-2 text-sm rounded-lg cursor-pointer transition-all ${p.id === currentProjectId ? 'bg-blue-600/20 text-blue-400' : 'text-slate-400'}`;
                div.onclick = () => { loadProject(p.id); if(window.innerWidth < 768) toggleSidebar(); };
                div.innerHTML = `<span class="truncate">${p.name}</span><button onclick="deleteProject('${p.id}', event)"><i class="fas fa-trash text-[10px]"></i></button>`;
                list.appendChild(div);
            });
        }

        function loadProject(id) {
            currentProjectId = id;
            localStorage.setItem('ai_builder_current_id', id);
            const project = projects.find(p => p.id === id);
            if (project) updatePreview(project.code);
            renderProjectList();
        }

        function setView(view) {
            const isPrev = view === 'preview';
            document.getElementById('preview-container').classList.toggle('hidden', !isPrev);
            document.getElementById('code-container').classList.toggle('hidden', isPrev);
            document.getElementById('btn-preview').className = isPrev ? "px-2 md:px-4 py-1 rounded-md bg-blue-600 text-white" : "px-2 md:px-4 py-1 rounded-md text-slate-400";
            document.getElementById('btn-code').className = !isPrev ? "px-2 md:px-4 py-1 rounded-md bg-blue-600 text-white" : "px-2 md:px-4 py-1 rounded-md text-slate-400";
        }

        function updatePreview(html) {
            document.getElementById('code-editor').value = html;
            const doc = document.getElementById('preview-frame').contentWindow.document;
            doc.open(); doc.write(html || '<body style="color:#94a3b8; font-family:sans-serif; text-align:center; padding-top:50px;">Your site will appear here...</body>'); doc.close();
        }

        function downloadCode() {
            const code = document.getElementById('code-editor').value;
            if(!code) return alert("Empty!");
            const blob = new Blob([code], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'index.html'; a.click();
        }

        function undoChange() {
            const project = projects.find(p => p.id === currentProjectId);
            if (project && project.history.length > 2) {
                project.history.splice(-2);
                project.code = project.history.length > 0 ? project.history[project.history.length-1].content : "";
                saveProjects(); updatePreview(project.code);
            } else { alert("No undos left."); }
        }

        function applyTemplate(t) { document.getElementById('user-input').value = t; }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const prompt = input.value.trim();
            const settings = JSON.parse(localStorage.getItem('ai_builder_settings')) || DEFAULT_SETTINGS;
            if (!prompt || !settings.key) return alert("Key missing!");

            const sendBtn = document.getElementById('send-btn');
            const loader = document.getElementById('loading-indicator');
            input.disabled = true; loader.classList.remove('hidden');

            const project = projects.find(p => p.id === currentProjectId);
            const messages = [{ role: "system", content: SYSTEM_PROMPT }, ...project.history, { role: "user", content: prompt }];

            try {
                const response = await fetch(settings.url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${settings.key}` },
                    body: JSON.stringify({ model: settings.model, messages: messages })
                });
                const data = await response.json();
                let aiContent = (data.choices?.[0]?.message?.content || "").replace(/```html|```|<think>[\s\S]*?<\/think>/g, '');
                project.history.push({ role: "user", content: prompt }, { role: "assistant", content: aiContent });
                project.code = aiContent;
                saveProjects(); updatePreview(aiContent);
                input.value = '';
            } catch (error) { alert("Fail!"); } 
            finally { input.disabled = false; loader.classList.add('hidden'); }
        }
    </script>
</body>
</html>
