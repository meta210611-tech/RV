<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>METAI - AI Website Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        body {
            min-height: 100dvh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #0f172a;
            color: white;
        }

        .checkerboard {
            background-image: 
                linear-gradient(45deg, #ccc 25%, transparent 25%), 
                linear-gradient(-45deg, #ccc 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #ccc 75%), 
                linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: white;
        }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="font-sans antialiased">

    <div id="app" class="flex w-full h-full">

        <aside class="w-64 bg-slate-900 border-r border-slate-700 flex flex-col flex-shrink-0 transition-all duration-300 mobile-hidden" id="sidebar">
            <div class="p-4 border-b border-slate-700">
                <button onclick="createNewProject()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-2 px-4 rounded transition flex items-center justify-center gap-2 text-sm">
                    <i class="fas fa-plus"></i> New Project
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-2 space-y-1">
                <p class="px-3 py-2 text-xs font-bold text-slate-500 uppercase tracking-wider">Projects</p>
                <div id="project-list"></div>
                
                <hr class="my-4 border-slate-800">
                
                <p class="px-3 py-2 text-xs font-bold text-slate-500 uppercase tracking-wider">Quick Actions</p>
                <div class="space-y-1">
                    <button onclick="applyTemplate('Add a modern hero section with a big title and a call-to-action button.')" class="w-full text-left px-4 py-2 text-xs text-slate-400 hover:bg-slate-800 hover:text-white rounded transition flex items-center gap-2">
                        <i class="fas fa-bolt text-yellow-500"></i> Add Hero Section
                    </button>
                    <button onclick="applyTemplate('Add a professional contact form with Name, Email, and Message fields.')" class="w-full text-left px-4 py-2 text-xs text-slate-400 hover:bg-slate-800 hover:text-white rounded transition flex items-center gap-2">
                        <i class="fas fa-envelope text-blue-500"></i> Add Contact Form
                    </button>
                    <button onclick="applyTemplate('Add a responsive pricing table with three tiers: Basic, Pro, and Enterprise.')" class="w-full text-left px-4 py-2 text-xs text-slate-400 hover:bg-slate-800 hover:text-white rounded transition flex items-center gap-2">
                        <i class="fas fa-tags text-green-500"></i> Add Pricing Table
                    </button>
                    <button onclick="applyTemplate('Make the entire design dark mode with a sleek, high-tech aesthetic.')" class="w-full text-left px-4 py-2 text-xs text-slate-400 hover:bg-slate-800 hover:text-white rounded transition flex items-center gap-2">
                        <i class="fas fa-moon text-purple-500"></i> Apply Dark Theme
                    </button>
                </div>
            </div>

            <div class="p-4 border-t border-slate-700 bg-slate-900">
                <button onclick="toggleSettings()" class="w-full text-slate-400 hover:text-white flex items-center gap-2 transition text-sm">
                    <i class="fas fa-cog fa-lg"></i> <span>Settings</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-full min-w-0 bg-slate-800">
            
            <header class="h-14 border-b border-slate-700 bg-slate-900 flex items-center justify-between px-4 flex-shrink-0">
                <div class="flex gap-2">
                    <div class="w-3 h-3 rounded-full bg-red-500"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                </div>

                <div class="bg-slate-800 p-1 rounded-lg flex text-sm">
                    <button id="btn-preview" onclick="setView('preview')" class="px-3 py-1 rounded bg-slate-600 text-white shadow">Preview</button>
                    <button id="btn-code" onclick="setView('code')" class="px-3 py-1 rounded text-slate-400 hover:text-white">Code</button>
                </div>

                <div class="flex gap-4">
                    <button onclick="downloadCode()" class="flex items-center gap-2 bg-slate-700 hover:bg-blue-600 text-white px-3 py-1 rounded-md transition text-xs font-bold" title="Download index.html">
                        <i class="fas fa-download"></i> <span class="hidden sm:inline">Export HTML</span>
                    </button>
                    <button onclick="toggleSidebar()" class="md:hidden text-slate-400">
                        <i class="fas fa-bars fa-lg"></i>
                    </button>
                </div>
            </header>

            <div class="flex-1 relative overflow-hidden bg-gray-100">
                <div id="preview-container" class="w-full h-full checkerboard">
                    <iframe id="preview-frame" class="w-full h-full border-none bg-white"></iframe>
                </div>
                
                <div id="code-container" class="hidden w-full h-full bg-slate-900">
                    <textarea id="code-editor" class="w-full h-full bg-slate-900 text-green-400 font-mono p-4 text-sm resize-none focus:outline-none" spellcheck="false"></textarea>
                </div>
            </div>

            <footer class="border-t border-slate-700 bg-slate-900 p-4 flex-shrink-0">
                <div class="relative max-w-4xl mx-auto w-full">
                    <textarea 
                        id="user-input" 
                        placeholder="Describe your website..." 
                        class="w-full bg-slate-800 text-white rounded-xl pl-4 pr-12 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none h-14"
                        onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }"
                    ></textarea>
                    <button onclick="sendMessage()" id="send-btn" class="absolute right-3 top-3 text-blue-500 hover:text-blue-400 p-1">
                        <i class="fas fa-paper-plane fa-lg"></i>
                    </button>
                    <div id="loading-indicator" class="absolute right-3 top-3 hidden">
                        <div class="loader"></div>
                    </div>
                </div>
            </footer>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">
        <div class="bg-slate-800 border border-slate-700 rounded-lg w-full max-w-md p-6 shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-white">Settings</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">API URL (OpenRouter)</label>
                    <input type="text" id="setting-url" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-slate-300 text-sm focus:border-blue-500 focus:outline-none" value="https://openrouter.ai/api/v1/chat/completions">
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">API Key</label>
                    <input type="password" id="setting-key" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-slate-300 text-sm focus:border-blue-500 focus:outline-none" placeholder="sk-or-...">
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Model ID</label>
                    <input type="text" id="setting-model" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-slate-300 text-sm focus:border-blue-500 focus:outline-none" value="deepseek/deepseek-r1:free">
                </div>
            </div>

            <div class="mt-6 flex justify-end gap-2">
                <button onclick="toggleSettings()" class="px-4 py-2 text-slate-400 hover:text-white">Cancel</button>
                <button onclick="saveSettings()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded">Save</button>
            </div>
        </div>
    </div>

    <script>
        const SYSTEM_PROMPT = `You are an expert web developer. 
        Your task is to generate a COMPLETE, SINGLE-FILE index.html based on the user's request.
        Include all necessary CSS (use Tailwind CDN) and JS within the file.
        Do NOT wrap the code in markdown code blocks. 
        Output ONLY the raw HTML code starting with <!DOCTYPE html>.
        If modifying an existing page, output the FULL updated code.`;

        const DEFAULT_SETTINGS = {
            url: "https://openrouter.ai/api/v1/chat/completions",
            key: "",
            model: "deepseek/deepseek-r1:free"
        };

        let projects = JSON.parse(localStorage.getItem('ai_builder_projects')) || [];
        let currentProjectId = localStorage.getItem('ai_builder_current_id') || null;
        
        document.addEventListener('DOMContentLoaded', () => {
            loadSettingsInputs();
            renderProjectList();
            if (projects.length === 0) {
                createNewProject();
            } else if (currentProjectId) {
                loadProject(currentProjectId);
            } else {
                loadProject(projects[0].id);
            }
        });

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
        }

        function loadSettingsInputs() {
            const settings = JSON.parse(localStorage.getItem('ai_builder_settings')) || DEFAULT_SETTINGS;
            document.getElementById('setting-url').value = "https://openrouter.ai/api/v1/chat/completions"; 
            document.getElementById('setting-key').value = settings.key;
            document.getElementById('setting-model').value = settings.model;
        }

        function saveSettings() {
            const newSettings = {
                url: document.getElementById('setting-url').value,
                key: document.getElementById('setting-key').value,
                model: document.getElementById('setting-model').value
            };
            localStorage.setItem('ai_builder_settings', JSON.stringify(newSettings));
            toggleSettings();
        }

        function createNewProject() {
            const newProject = {
                id: Date.now().toString(),
                name: `Project ${projects.length + 1}`,
                history: [],
                code: ""
            };
            projects.unshift(newProject);
            saveProjects();
            loadProject(newProject.id);
        }

        function saveProjects() {
            localStorage.setItem('ai_builder_projects', JSON.stringify(projects));
            renderProjectList();
        }

        function renderProjectList() {
            const list = document.getElementById('project-list');
            list.innerHTML = '';
            projects.forEach(p => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-4 py-3 text-sm truncate rounded transition ${p.id === currentProjectId ? 'bg-slate-800 text-blue-400 border-l-2 border-blue-500' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`;
                btn.innerText = p.name;
                btn.onclick = () => loadProject(p.id);
                list.appendChild(btn);
            });
        }

        function loadProject(id) {
            currentProjectId = id;
            localStorage.setItem('ai_builder_current_id', id);
            const project = projects.find(p => p.id === id);
            if (!project) return;
            updatePreview(project.code);
            renderProjectList();
        }

        function setView(view) {
            const preview = document.getElementById('preview-container');
            const code = document.getElementById('code-container');
            const btnPreview = document.getElementById('btn-preview');
            const btnCode = document.getElementById('btn-code');

            if (view === 'preview') {
                preview.classList.remove('hidden');
                code.classList.add('hidden');
                btnPreview.classList.add('bg-slate-600', 'text-white', 'shadow');
                btnPreview.classList.remove('text-slate-400');
                btnCode.classList.remove('bg-slate-600', 'text-white', 'shadow');
                btnCode.classList.add('text-slate-400');
            } else {
                preview.classList.add('hidden');
                code.classList.remove('hidden');
                btnCode.classList.add('bg-slate-600', 'text-white', 'shadow');
                btnCode.classList.remove('text-slate-400');
                btnPreview.classList.remove('bg-slate-600', 'text-white', 'shadow');
                btnPreview.classList.add('text-slate-400');
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('hidden');
        }

        function updatePreview(html) {
            document.getElementById('code-editor').value = html;
            const iframe = document.getElementById('preview-frame');
            const doc = iframe.contentWindow.document;
            doc.open();
            doc.write(html);
            doc.close();
        }

        function downloadCode() {
            const code = document.getElementById('code-editor').value;
            if(!code) { alert("Generate some code first!"); return; }
            const blob = new Blob([code], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'index.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // NEW: Apply Template Function
        function applyTemplate(promptText) {
            const input = document.getElementById('user-input');
            input.value = promptText;
            input.focus();
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const prompt = input.value.trim();
            const settings = JSON.parse(localStorage.getItem('ai_builder_settings')) || DEFAULT_SETTINGS;
            
            if (!prompt) return;
            if (!settings.key) { alert("Please enter your API Key in settings."); toggleSettings(); return; }

            const sendBtn = document.getElementById('send-btn');
            const loader = document.getElementById('loading-indicator');
            input.disabled = true;
            sendBtn.classList.add('hidden');
            loader.classList.remove('hidden');

            const project = projects.find(p => p.id === currentProjectId);
            const messages = [
                { role: "system", content: SYSTEM_PROMPT },
                ...project.history,
                { role: "user", content: prompt }
            ];

            try {
                const response = await fetch(settings.url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${settings.key}`,
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'METAI AI Builder'
                    },
                    body: JSON.stringify({
                        model: settings.model,
                        messages: messages
                    })
                });

                const text = await response.text();
                if (!response.ok) throw new Error(`API Error: ${text}`);

                let data = JSON.parse(text);
                let aiContent = data.choices?.[0]?.message?.content || "";
                
                aiContent = aiContent.replace(/```html/g, '').replace(/```/g, '').replace(/<think>[\s\S]*?<\/think>/g, '');
                
                project.history.push({ role: "user", content: prompt });
                project.history.push({ role: "assistant", content: aiContent });
                project.code = aiContent;

                saveProjects();
                updatePreview(aiContent);
                input.value = '';

            } catch (error) {
                console.error(error);
                alert("Generation failed. Check API Key.");
            } finally {
                input.disabled = false;
                sendBtn.classList.remove('hidden');
                loader.classList.add('hidden');
                input.focus();
            }
        }
    </script>
</body>
  </html>
