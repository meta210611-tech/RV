<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>METAI - Professional AI Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        :root {
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --accent: #3b82f6;
        }

        /* Theme Classes */
        body.theme-midnight { --bg-main: #020617; --bg-sidebar: #0f172a; --accent: #6366f1; }
        body.theme-forest { --bg-main: #064e3b; --bg-sidebar: #065f46; --accent: #10b981; }
        body.theme-crimson { --bg-main: #450a0a; --bg-sidebar: #7f1d1d; --accent: #f43f5e; }

        body {
            min-height: 100dvh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: var(--bg-main);
            color: #f8fafc;
            transition: background-color 0.3s ease;
        }

        #sidebar { background-color: var(--bg-sidebar); }

        @media (max-width: 768px) {
            #sidebar {
                position: fixed; left: -100%; top: 0; bottom: 0; z-index: 50;
                width: 85%; max-width: 320px; transition: 0.3s ease-in-out;
            }
            #sidebar.active { left: 0; }
            .mobile-overlay {
                display: none; position: fixed; inset: 0;
                background: rgba(0,0,0,0.8); z-index: 40; backdrop-filter: blur(4px);
            }
            .mobile-overlay.active { display: block; }
        }

        .checkerboard {
            background-image: linear-gradient(45deg, #e2e8f0 25%, transparent 25%), linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e2e8f0 75%), linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
            background-size: 20px 20px; background-color: #f1f5f9;
        }
        
        .loader {
            border: 2px solid rgba(255,255,255,0.1); border-radius: 50%;
            border-top: 2px solid var(--accent); width: 18px; height: 18px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="font-sans antialiased theme-midnight">

    <div id="sidebar-overlay" class="mobile-overlay" onclick="toggleSidebar()"></div>

    <div id="app" class="flex w-full h-full">

        <aside id="sidebar" class="border-r border-white/5 flex flex-col flex-shrink-0 w-72">
            <div class="p-6 flex justify-between items-center">
                <h1 class="text-2xl font-black tracking-tighter text-white">METAI <span class="text-[10px] bg-blue-600 px-1.5 py-0.5 rounded ml-1 uppercase">Pro</span></h1>
                <button onclick="toggleSidebar()" class="md:hidden text-slate-400"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="px-5 mb-6">
                <button onclick="createNewProject()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-blue-900/40">
                    <i class="fas fa-plus"></i> New Project
                </button>
            </div>

            <div class="flex-1 overflow-y-auto px-3 space-y-6">
                <div>
                    <p class="px-3 mb-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Projects</p>
                    <div id="project-list" class="space-y-1"></div>
                </div>
                
                <div>
                    <p class="px-3 mb-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Theme</p>
                    <div class="grid grid-cols-3 gap-2 px-3">
                        <button onclick="setTheme('midnight')" class="h-8 rounded bg-slate-900 border border-white/10"></button>
                        <button onclick="setTheme('forest')" class="h-8 rounded bg-emerald-900 border border-white/10"></button>
                        <button onclick="setTheme('crimson')" class="h-8 rounded bg-red-900 border border-white/10"></button>
                    </div>
                </div>
            </div>

            <div class="p-4 bg-black/20 border-t border-white/5">
                <button onclick="toggleSettings()" class="w-full text-slate-400 hover:text-white flex items-center gap-3 transition px-3 py-2 text-sm">
                    <i class="fas fa-cog"></i> <span>Settings</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-full min-w-0">
            
            <header class="h-16 border-b border-white/5 bg-black/10 backdrop-blur-md flex items-center justify-between px-4 md:px-6 flex-shrink-0">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="text-slate-400 hover:text-white"><i class="fas fa-bars"></i></button>
                    <div class="flex bg-white/5 p-1 rounded-lg">
                        <button id="btn-preview" onclick="setView('preview')" class="px-4 py-1.5 rounded-md text-[10px] font-bold transition-all">PREVIEW</button>
                        <button id="btn-code" onclick="setView('code')" class="px-4 py-1.5 rounded-md text-[10px] font-bold transition-all">CODE</button>
                    </div>
                </div>

                <div class="flex items-center gap-3">
                    <button onclick="undoChange()" class="text-slate-500 hover:text-white p-2" title="Undo"><i class="fas fa-undo-alt"></i></button>
                    <button onclick="copyCurrentCode()" class="hidden md:flex items-center gap-2 text-slate-400 hover:text-white text-[10px] font-bold px-3 py-2">
                        <i class="fas fa-copy"></i> COPY
                    </button>
                    <button onclick="downloadCode()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-[10px] font-bold hover:bg-blue-500 transition-all">
                        EXPORT
                    </button>
                </div>
            </header>

            <div class="flex-1 relative overflow-hidden">
                <div id="preview-container" class="w-full h-full checkerboard">
                    <iframe id="preview-frame" class="w-full h-full border-none bg-white shadow-2xl"></iframe>
                </div>
                <div id="code-container" class="hidden w-full h-full">
                    <textarea id="code-editor" class="w-full h-full bg-[#010409] text-blue-300 font-mono p-6 text-sm resize-none outline-none" readonly></textarea>
                </div>
            </div>

            <footer class="p-4 md:p-6 border-t border-white/5">
                <div class="relative max-w-4xl mx-auto flex gap-3">
                    <textarea id="user-input" placeholder="Update the hero section with a blue gradient..." class="flex-1 bg-white/5 border border-white/10 text-white rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500/50 resize-none h-14 text-sm transition-all shadow-xl" onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }"></textarea>
                    <button onclick="sendMessage()" id="send-btn" class="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center shrink-0 shadow-lg active:scale-95 transition-all">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                    <div id="loading-indicator" class="absolute right-20 top-5 hidden"><div class="loader"></div></div>
                </div>
            </footer>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-[70] p-4 backdrop-blur-md">
        <div class="bg-slate-900 border border-white/10 rounded-3xl w-full max-w-md p-8">
            <h2 class="text-xl font-bold mb-6 text-white">API Configuration</h2>
            <div class="space-y-4">
                <input type="password" id="setting-key" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none" placeholder="OpenRouter API Key">
                <input type="text" id="setting-model" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none" value="deepseek/deepseek-r1:free">
            </div>
            <div class="mt-8 flex justify-end gap-4">
                <button onclick="toggleSettings()" class="text-slate-400 font-bold px-4">CLOSE</button>
                <button onclick="saveSettings()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold">SAVE</button>
            </div>
        </div>
    </div>

    <script>
        const SYSTEM_PROMPT = `Generate a modern, responsive SINGLE-FILE index.html using Tailwind CSS. Output ONLY raw HTML code.`;
        let projects = JSON.parse(localStorage.getItem('metai_projects')) || [];
        let currentProjectId = localStorage.getItem('metai_current_id') || null;

        document.addEventListener('DOMContentLoaded', () => {
            const settings = JSON.parse(localStorage.getItem('metai_settings')) || { key: "", model: "deepseek/deepseek-r1:free" };
            document.getElementById('setting-key').value = settings.key;
            document.getElementById('setting-model').value = settings.model;
            setTheme(localStorage.getItem('metai_theme') || 'midnight');
            renderProjectList();
            if (projects.length === 0) createNewProject();
            else loadProject(currentProjectId || projects[0].id);
        });

        // UI Handlers
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('sidebar-overlay').classList.toggle('active'); }
        function toggleSettings() { document.getElementById('settings-modal').classList.toggle('hidden'); document.getElementById('settings-modal').classList.toggle('flex'); }
        function setTheme(t) { document.body.className = `antialiased theme-${t}`; localStorage.setItem('metai_theme', t); }
        function setView(v) {
            const isP = v === 'preview';
            document.getElementById('preview-container').classList.toggle('hidden', !isP);
            document.getElementById('code-container').classList.toggle('hidden', isP);
            document.getElementById('btn-preview').className = isP ? "px-4 py-1.5 rounded-md bg-blue-600 text-white shadow-lg" : "px-4 py-1.5 rounded-md text-slate-400";
            document.getElementById('btn-code').className = !isP ? "px-4 py-1.5 rounded-md bg-blue-600 text-white shadow-lg" : "px-4 py-1.5 rounded-md text-slate-400";
        }

        // Logic
        function createNewProject() {
            const p = { id: Date.now().toString(), name: `Untitled ${projects.length + 1}`, history: [], code: "" };
            projects.unshift(p); save(); loadProject(p.id);
        }
        function renameProject(id, e) {
            e.stopPropagation(); const p = projects.find(x => x.id === id);
            const n = prompt("Rename project:", p.name); if(n) { p.name = n; save(); }
        }
        function deleteProject(id, e) {
            e.stopPropagation(); if(!confirm("Delete?")) return;
            projects = projects.filter(x => x.id !== id); save();
            if(projects.length > 0) loadProject(projects[0].id); else createNewProject();
        }
        function loadProject(id) {
            currentProjectId = id; localStorage.setItem('metai_current_id', id);
            const p = projects.find(x => x.id === id); updateViewer(p?.code || ""); renderProjectList();
        }
        function renderProjectList() {
            const l = document.getElementById('project-list'); l.innerHTML = '';
            projects.forEach(p => {
                const active = p.id === currentProjectId;
                const d = document.createElement('div');
                d.className = `group flex items-center justify-between px-4 py-3 rounded-xl cursor-pointer ${active ? 'bg-blue-600/20 text-white' : 'text-slate-500 hover:bg-white/5'}`;
                d.onclick = () => { loadProject(p.id); if(window.innerWidth < 768) toggleSidebar(); };
                d.innerHTML = `<span class="truncate text-sm font-medium">${p.name}</span>
                    <div class="flex gap-2 opacity-0 group-hover:opacity-100"><button onclick="renameProject('${p.id}', event)"><i class="fas fa-edit text-[10px]"></i></button>
                    <button onclick="deleteProject('${p.id}', event)"><i class="fas fa-trash text-[10px]"></i></button></div>`;
                l.appendChild(d);
            });
        }
        function save() { localStorage.setItem('metai_projects', JSON.stringify(projects)); renderProjectList(); }
        function updateViewer(h) {
            document.getElementById('code-editor').value = h;
            const f = document.getElementById('preview-frame').contentWindow.document;
            f.open(); f.write(h || '<body style="background:#0f172a; display:flex; align-items:center; justify-content:center; height:100vh; color:#334155; font-family:sans-serif;">Describe your site to start...</body>'); f.close();
        }
        function copyCurrentCode() {
            const c = document.getElementById('code-editor'); c.select(); document.execCommand('copy'); alert('Code copied!');
        }
        function downloadCode() {
            const c = document.getElementById('code-editor').value; if(!c) return;
            const b = new Blob([c], {type:'text/html'}); const u = URL.createObjectURL(b);
            const a = document.createElement('a'); a.href = u; a.download = 'index.html'; a.click();
        }
        function undoChange() {
            const p = projects.find(x => x.id === currentProjectId);
            if(p && p.history.length > 2) { p.history.splice(-2); p.code = p.history[p.history.length-1].content; save(); updateViewer(p.code); }
        }

        async function sendMessage() {
            const i = document.getElementById('user-input'); const s = JSON.parse(localStorage.getItem('metai_settings'));
            if(!i.value.trim() || !s?.key) return alert("Missing Key or Prompt");
            const btn = document.getElementById('send-btn'); const ldr = document.getElementById('loading-indicator');
            i.disabled = true; btn.classList.add('opacity-0'); ldr.classList.remove('hidden');
            const p = projects.find(x => x.id === currentProjectId);
            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${s.key}`},
                    body: JSON.stringify({ model: s.model, messages: [{role:"system",content:SYSTEM_PROMPT}, ...p.history, {role:"user",content:i.value}] })
                });
                const d = await res.json(); const c = d.choices[0].message.content.replace(/```html|```|<think>[\s\S]*?<\/think>/g, '');
                p.history.push({role:"user",content:i.value}, {role:"assistant",content:c}); p.code = c;
                save(); updateViewer(c); i.value = '';
            } catch(e) { alert("Error!"); } finally { i.disabled = false; btn.classList.remove('opacity-0'); ldr.classList.add('hidden'); i.focus(); }
        }
        function saveSettings() {
            localStorage.setItem('metai_settings', JSON.stringify({ key: document.getElementById('setting-key').value, model: document.getElementById('setting-model').value }));
            toggleSettings();
        }
    </script>
</body>
</html>
